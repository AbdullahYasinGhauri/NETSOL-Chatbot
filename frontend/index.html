<body>

<div class="app">

    <div class="sidebar">

        <button class="new-chat" onclick="newChat()">
            + New Chat
        </button>

        <div id="sessions"></div>

    </div>

    <div class="container">

        <div class="header">
            <h2>NETSOL AI Assistant</h2>
        </div>

        <div id="chat-box" class="chat-box"></div>

        <div class="input-area">

            <input
                id="question"
                type="text"
                placeholder="Ask something..."
            >

            <button onclick="sendMessage()">
                Send
            </button>

        </div>

    </div>

</div>

<script src="script.js"></script>

</body>
