<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NETSOL AI Assistant</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

    <aside class="sidebar">

        <div class="brand">
            <div class="brand-mark">N</div>
            <div class="brand-text">
                <span class="brand-name">NETSOL</span>
                <span class="brand-sub">AI Assistant</span>
            </div>
        </div>

        <button class="new-chat" onclick="newChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            New chat
        </button>

        <div class="sidebar-label">Recent</div>

        <div id="sessions" class="sessions"></div>

    </aside>

    <main class="container">

        <div class="header">
            <div class="header-title">
                <h2>NETSOL AI Assistant</h2>
                <p>Ask about policies, claims, or platform data</p>
            </div>
            <div class="status-pill">
                <span class="status-dot"></span>
                Online
            </div>
        </div>

        <div id="chat-box" class="chat-box">
            <div class="empty-state" id="empty-state">
                <div class="empty-mark">N</div>
                <h3>Start the conversation</h3>
                <p>Ask a question and I'll pull the answer from your NETSOL data.</p>
            </div>
        </div>

        <div class="input-area">
            <input
                id="question"
                type="text"
                placeholder="Ask something..."
                autocomplete="off"
            >
            <button id="send-btn" onclick="sendMessage()">
                Send
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
        </div>

    </main>

</div>

<script src="script.js"></script>

</body>
</html>
